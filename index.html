<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="container">
      <div class="row">
        <form class="col" id="scan-paths-form">
          <h2 class="title">Enter folders to compare</h2>

          <label for="f1">
            <div class="finput-col">
              <div class="finput-row">
                <p>Folder 1</p>
                <p class="folder-icon folder1-icon"></p>
              </div>
              <p class="finput-button">Choose</p>
            </div>
          </label>
          <input
            type="file"
            webkitdirectory
            id="f1"
            multiple
            class="finput-native-w"
          />

          <label for="f2">
            <div class="finput-col">
              <div class="finput-row">
                <p>Folder 2</p>
                <p class="folder-icon folder2-icon"></p>
              </div>
              <p class="finput-button">Choose</p>
            </div>
          </label>
          <input
            type="file"
            webkitdirectory
            id="f2"
            multiple
            class="finput-native-w"
          />

          <button id="scan-btn">Scan</button>
        </form>
        <div class="col" id="differences-container-large">
          <h2 class="title">Files</h2>
          <ul class="differences">
            <li
              class="file-difference-item"
              style="
                border: 1px solid var(--color-error);
                background: none;
                justify-content: center;
              "
              id="no-files"
            >
              No files found
            </li>
          </ul>
        </div>
        <button id="differences-container-small-button">
          Show differences
        </button>
      </div>
    </div>
    <div id="differences-container-small">
      <button id="differences-container-small-close-btn">Close</button>
      <ul class="differences"></ul>
    </div>
  </body>
</html>
